name: Update Vote Counts

# Every 6h, walk every kind's directory and sync metadata.votes with the
# corresponding GitHub Issue's :+1: reaction count.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch reaction counts and update metadata
        id: fetch-votes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Source directories for each asset kind.
            const KIND_DIRS = [
              'layouts',
              'sprites/pets',
              'sprites/characters',
              'sprites/props',
              'backgrounds',
            ];

            let changed = false;

            for (const kindDir of KIND_DIRS) {
              if (!fs.existsSync(kindDir)) continue;
              const entries = fs.readdirSync(kindDir, { withFileTypes: true });
              for (const entry of entries) {
                if (!entry.isDirectory()) continue;
                const metaPath = path.join(kindDir, entry.name, 'metadata.json');
                if (!fs.existsSync(metaPath)) continue;

                const metadata = JSON.parse(fs.readFileSync(metaPath, 'utf8'));
                if (!metadata.issueNumber) continue;

                try {
                  const reactions = await github.rest.reactions.listForIssue({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: metadata.issueNumber,
                    per_page: 100,
                  });
                  const likes = reactions.data.filter((r) => r.content === '+1').length;
                  if (metadata.votes !== likes) {
                    metadata.votes = likes;
                    fs.writeFileSync(metaPath, JSON.stringify(metadata, null, 2) + '\n');
                    console.log(`${kindDir}/${entry.name}: ${likes} likes`);
                    changed = true;
                  }
                } catch (e) {
                  console.warn(`Failed for #${metadata.issueNumber} (${kindDir}/${entry.name}): ${e.message}`);
                }
              }
            }

            if (!changed) console.log('No vote changes');
            core.setOutput('changed', changed.toString());

      - name: Regenerate manifests
        if: steps.fetch-votes.outputs.changed == 'true'
        run: node scripts/generate-manifests.js

      - name: Commit changes
        if: steps.fetch-votes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update vote counts"
          git push
