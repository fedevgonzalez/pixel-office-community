name: Generate Manifests

# Regenerate per-kind manifests whenever any asset directory changes on main.
# Each kind has its own manifest file:
#   - gallery.json         (legacy alias for layouts — kept for older clients)
#   - layouts.json
#   - sprites/pets.json
#   - sprites/characters.json
#   - sprites/props.json
#   - backgrounds.json

on:
  push:
    branches: [main]
    paths:
      - "layouts/**"
      - "sprites/**"
      - "backgrounds/**"
      - "scripts/generate-manifests.js"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate all manifests
        run: node scripts/generate-manifests.js

      - name: Commit changed manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery.json layouts.json sprites/pets.json sprites/characters.json sprites/props.json backgrounds.json
          git diff --cached --quiet || git commit -m "chore: update community manifests"
          git push
